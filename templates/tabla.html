<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consola de Asesorados — UDEP</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    <!-- SheetJS para exportar a Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        /* ── Layout consola ── */
        .consola-layout {
            display: flex;
            min-height: calc(100vh - 62px);
        }

        /* ── Sidebar ── */
        .consola-sidebar {
            width: 260px;
            flex-shrink: 0;
            background: var(--udep-light);
            border-right: 1px solid var(--udep-border);
            display: flex;
            flex-direction: column;
            padding: 24px 0 32px;
            box-shadow: 2px 0 8px rgba(0,56,118,0.06);
        }

        .sidebar-section {
            padding: 0 20px 20px;
            border-bottom: 1px solid var(--udep-border);
            margin-bottom: 8px;
        }

        .sidebar-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        /* Módulo bienvenida */
        .sidebar-welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 10px;
            padding: 16px 20px 20px;
            border-bottom: 1px solid var(--udep-border);
        }

        .sidebar-avatar {
            width: 54px;
            height: 54px;
            background: var(--udep-blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar-avatar svg {
            color: #fff;
        }

        .sidebar-welcome-label {
            font-size: .72rem;
            color: var(--text-muted);
            letter-spacing: .06em;
            text-transform: uppercase;
        }

        .sidebar-welcome-name {
            font-family: 'Merriweather', serif;
            font-size: .92rem;
            font-weight: 700;
            color: var(--udep-blue);
            line-height: 1.35;
            word-break: break-word;
        }

        /* Menú de módulos */
        .sidebar-menu {
            padding: 12px 12px 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .sidebar-menu-label {
            font-size: .68rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: .1em;
            text-transform: uppercase;
            padding: 8px 8px 6px;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: .88rem;
            font-weight: 600;
            color: var(--text-dark);
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            transition: background .15s, color .15s;
            font-family: 'Source Sans 3', sans-serif;
        }

        .sidebar-item:hover {
            background: #eef2fb;
            color: var(--udep-blue-mid);
        }

        .sidebar-item.active {
            background: var(--udep-blue);
            color: #fff;
        }

        .sidebar-item.active svg {
            stroke: #fff;
        }

        .sidebar-item svg {
            flex-shrink: 0;
            stroke: var(--text-muted);
            transition: stroke .15s;
        }

        .sidebar-item:hover svg {
            stroke: var(--udep-blue-mid);
        }

        .sidebar-logout {
            margin-top: auto;
            padding: 0 20px;
        }

        .sidebar-logout a {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: .82rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: color .15s;
            padding: 8px 0;
        }

        .sidebar-logout a:hover {
            color: var(--udep-red);
        }

        /* ── Área de contenido ── */
        .consola-content {
            flex: 1;
            padding: 32px 32px 60px;
            overflow-x: auto;
            background: var(--udep-light);
        }

        /* Panel de bienvenida inicial (antes de elegir módulo) */
        .panel-inicio {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 16px;
            color: var(--text-muted);
            text-align: center;
        }

        .panel-inicio svg {
            opacity: .25;
        }

        .panel-inicio h2 {
            font-family: 'Merriweather', serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--udep-blue);
            opacity: .5;
        }

        .panel-inicio p {
            font-size: .88rem;
        }
    </style>
</head>
<body class="tabla-page">

    <!-- ── Navbar ── -->
    <header class="tb-navbar">
        <div class="tb-navbar-brand">
            <div class="tb-logo-text">
                Universidad de Piura
                <span>Sistema de Asesoramiento</span>
            </div>
        </div>
    </header>

    <!-- ── Layout principal con sidebar ── -->
    <div class="consola-layout">

        <!-- ═══ SIDEBAR IZQUIERDO ═══ -->
        <aside class="consola-sidebar">

            <!-- Módulo: bienvenida -->
            <div class="sidebar-welcome">
                <div class="sidebar-avatar">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </div>
                <span class="sidebar-welcome-label">Bienvenido</span>
                <span class="sidebar-welcome-name" id="sb-nombre">Cargando...</span>
            </div>

            <!-- Módulo: menú de navegación -->
            <nav class="sidebar-menu">
                <span class="sidebar-menu-label">Módulos</span>

                <button class="sidebar-item" id="btn-asesorados" onclick="abrirAsesorados()">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                    Revisa tus asesorados
                </button>
            </nav>

            <!-- Logout al fondo -->
            <div class="sidebar-logout">
                <a href="/api/logout">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    Cerrar sesión
                </a>
            </div>

        </aside>

        <!-- ═══ ÁREA DE CONTENIDO ═══ -->
        <section class="consola-content">

            <!-- Panel de inicio (visible por defecto, se oculta al elegir módulo) -->
            <div id="panel-inicio" class="panel-inicio">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--udep-blue)">
                    <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                    <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
                </svg>
                <h2>Selecciona un módulo</h2>
                <p>Elige una opción del menú lateral para comenzar.</p>
            </div>

            <!-- Panel: Mis asesorados (oculto hasta hacer clic) -->
            <div id="panel-asesorados" style="display:none;">

                <!-- Encabezado del panel -->
                <div class="tb-page-header">
                    <div>
                        <h1 class="tb-title">Alumnos Asesorados</h1>
                        <p class="tb-subtitle" id="tb-subtitulo">Consultando base de datos...</p>
                    </div>
                    <button class="tb-btn-excel" id="btn-excel" onclick="exportarExcel()" disabled>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        Exportar a Excel
                    </button>
                </div>

                <!-- Estado de carga / error -->
                <div id="tb-estado" class="tb-estado" style="display:none;">
                    <div class="tb-spinner"></div>
                    <span>Consultando base de datos...</span>
                </div>

                <!-- Tabla -->
                <div class="tb-table-wrap" id="tb-table-wrap" style="display:none;">
                    <table class="tb-table" id="tb-tabla">
                        <thead>
                            <tr id="tb-head-row">
                                <th class="col-num">N°</th>
                            </tr>
                        </thead>
                        <tbody id="tb-body"></tbody>
                    </table>
                </div>

            </div><!-- /panel-asesorados -->

            <div id="contact-overlay" class="contact-overlay" hidden>
                <div class="contact-overlay-backdrop" onclick="cerrarOverlayContactos()"></div>
                <div class="contact-overlay-panel" role="dialog" aria-modal="true" aria-labelledby="contact-overlay-title">
                    <div class="contact-overlay-header">
                        <h3 id="contact-overlay-title">Contactos</h3>
                        <button type="button" class="contact-overlay-close" aria-label="Cerrar" onclick="cerrarOverlayContactos()">×</button>
                    </div>
                    <div id="contact-overlay-list" class="contact-overlay-list"></div>
                </div>
            </div>

        </section>

    </div><!-- /consola-layout -->

    <script>
        // ──────────────────────────────────────────────────
        //  Columnas y etiquetas
        // ──────────────────────────────────────────────────
        const LABELS = {
            REQ_NO:                  'Req. No',
            ULTIMO_PERIODO_SFRENSP:  'Periodo SFRENSP',
            KEY_SEQNO:               'Key Seqno',
            PROMEDIO:                'Promedio',
            SPRIDEN_ID:              'Código',
            SPRIDEN_FIRST_NAME:      'Nombres',
            SPRIDEN_LAST_NAME:       'Apellidos',
            SORLCUR_PROGRAM:         'Programa',
            SORLCUR_CAMP_CODE:       'Campus',
            SORLCUR_TERM_CODE_ADMIT: 'P. Admisión',
            SGRSTSP_KEY_SEQNO:       'Key Secuencia',
            SORLCUR_SEQNO:           'Secuencia Programa',
            CICLO_ACTUAL:            'Ciclo',
            NIVEL_ACTUAL:            'Nivel',
            PERIODO_SGRSATT:         'Periodo SGRSATT',
            BECAS:                   'Becas',
            REND_ACAD:               'Rend. Acad.',
            PRONABEC:                'Pronabec',
            ATRIBUTOS_CONTABLES:     'Atrib. Contables',
            PRE_SELECCIONADO_PRONABEC: 'Preselecc. Pronabec',
            CORREO:                  'Correo',
            TELEFONO:                'Teléfono'
        };

        const COLS_PREFERIDAS = [
            'SPRIDEN_ID', 'SPRIDEN_LAST_NAME', 'SPRIDEN_FIRST_NAME',
            'SORLCUR_PROGRAM', 'SORLCUR_CAMP_CODE',
            'SORLCUR_TERM_CODE_ADMIT', 'REQ_NO', 'PROMEDIO',
            'CICLO_ACTUAL', 'NIVEL_ACTUAL', 'ULTIMO_PERIODO_SFRENSP',
            'PERIODO_SGRSATT', 'BECAS', 'REND_ACAD', 'PRONABEC',
            'ATRIBUTOS_CONTABLES', 'PRE_SELECCIONADO_PRONABEC',
            'CORREO', 'TELEFONO'
        ];

        const COLS_OCULTAS = new Set([
            'SPRIDEN_PIDM', 'SGRSTSP_KEY_SEQNO', 'SORLCUR_SEQNO', 'KEY_SEQNO'
        ]);

        const COLS_BADGE = new Set([
            'BECAS', 'REND_ACAD', 'PRONABEC', 'ATRIBUTOS_CONTABLES', 'PRE_SELECCIONADO_PRONABEC'
        ]);

        const COLS_CONTACTO = new Set(['CORREO', 'TELEFONO']);

        let datosGlobales = [];
        let columnasGlobales = [];
        let asesoradosCargados = false;

        // ──────────────────────────────────────────────────
        //  Al cargar la página: solo sesión (sin alumnos)
        // ──────────────────────────────────────────────────
        async function init() {
            const sesRes = await fetch('/api/sesion');
            if (sesRes.status === 401) { window.location.href = '/'; return; }

            const ses = await sesRes.json();
            if (ses.success) {
                document.getElementById('sb-nombre').textContent =
                    ses.name || ses.usuario;
            }
        }

        // ──────────────────────────────────────────────────
        //  Abrir panel de asesorados (clic en sidebar)
        // ──────────────────────────────────────────────────
        async function abrirAsesorados() {
            // Marcar ítem activo
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            document.getElementById('btn-asesorados').classList.add('active');

            // Ocultar panel inicio, mostrar panel asesorados
            document.getElementById('panel-inicio').style.display    = 'none';
            document.getElementById('panel-asesorados').style.display = '';

            // Solo cargar datos una vez
            if (asesoradosCargados) return;

            // Mostrar spinner
            document.getElementById('tb-estado').style.display    = 'flex';
            document.getElementById('tb-table-wrap').style.display = 'none';
            document.getElementById('tb-subtitulo').textContent    = 'Consultando base de datos...';

            try {
                const res  = await fetch('/api/alumnos');
                const data = await res.json();

                document.getElementById('tb-estado').style.display = 'none';

                if (!data.success) {
                    mostrarError(data.mensaje || 'Error al obtener los datos');
                    return;
                }

                datosGlobales = data.datos;
                columnasGlobales = obtenerColumnasVisibles(data.columnas || []);
                renderEncabezado(columnasGlobales);
                renderTabla(data.datos, columnasGlobales);

                const total = data.total;
                document.getElementById('tb-subtitulo').textContent =
                    `${total} alumno${total !== 1 ? 's' : ''} asignado${total !== 1 ? 's' : ''}`;

                document.getElementById('btn-excel').disabled      = false;
                document.getElementById('tb-table-wrap').style.display = '';
                asesoradosCargados = true;

            } catch (err) {
                mostrarError('No se pudo conectar con el servidor');
            }
        }

        // ──────────────────────────────────────────────────
        //  Resolver columnas visibles
        // ──────────────────────────────────────────────────
        function obtenerColumnasVisibles(columnas) {
            const columnasFiltradas = columnas.filter(col => !COLS_OCULTAS.has(col));
            const preferidas = COLS_PREFERIDAS.filter(col => columnasFiltradas.includes(col));
            const adicionales = columnasFiltradas.filter(col => !preferidas.includes(col));
            return [...preferidas, ...adicionales];
        }

        // ──────────────────────────────────────────────────
        //  Renderizar encabezado
        // ──────────────────────────────────────────────────
        function renderEncabezado(columnas) {
            const headRow = document.getElementById('tb-head-row');
            headRow.innerHTML = '';

            const thNum = document.createElement('th');
            thNum.className = 'col-num';
            thNum.textContent = 'N°';
            headRow.appendChild(thNum);

            columnas.forEach(col => {
                const th = document.createElement('th');
                th.textContent = LABELS[col] || formatearNombreColumna(col);
                headRow.appendChild(th);
            });
        }

        // ──────────────────────────────────────────────────
        //  Etiqueta amigable para columnas sin alias visual
        // ──────────────────────────────────────────────────
        function formatearNombreColumna(columna) {
            return columna
                .toLowerCase()
                .split('_')
                .map(fragmento => fragmento.charAt(0).toUpperCase() + fragmento.slice(1))
                .join(' ');
        }

        // ──────────────────────────────────────────────────
        //  Renderizar filas
        // ──────────────────────────────────────────────────
        function renderTabla(datos, columnas) {
            const tbody = document.getElementById('tb-body');
            tbody.innerHTML = '';

            datos.forEach((fila, idx) => {
                const tr = document.createElement('tr');

                const tdNum = document.createElement('td');
                tdNum.className   = 'col-num';
                tdNum.textContent = idx + 1;
                tr.appendChild(tdNum);

                columnas.forEach(col => {
                    const td  = document.createElement('td');
                    const val = fila[col];
                    const esContactoConSeparadores = typeof val === 'string' && (val.includes('//') || val.includes('||'));

                    if (COLS_CONTACTO.has(col) || esContactoConSeparadores) {
                        td.classList.add('col-contacto');
                        renderCeldaContacto(td, val, col);
                    } else {
                        td.textContent = (val === null || val === undefined) ? '—' : val;
                    }

                    if (COLS_BADGE.has(col) && val) td.classList.add('col-badge');
                    tr.appendChild(td);
                });

                tbody.appendChild(tr);
            });
        }

        function renderCeldaContacto(td, valor, columna) {
            const contactos = parsearContactos(valor);

            if (!contactos.length) {
                td.textContent = formatearTextoContactoSinSeparadores(valor);
                return;
            }

            const preview = document.createElement('div');
            preview.className = 'contact-preview';

            const principal = crearEnlaceContacto(contactos[0].dato, columna, 'contact-preview-value');
            preview.appendChild(principal);

            if (contactos.length > 1) {
                const btnMore = document.createElement('button');
                btnMore.type = 'button';
                btnMore.className = 'contact-more-btn';
                btnMore.textContent = `+${contactos.length - 1} más`;
                btnMore.addEventListener('click', () => abrirOverlayContactos(columna, contactos));
                preview.appendChild(btnMore);
            }

            td.appendChild(preview);
        }

        function parsearContactos(valor) {
            if (typeof valor !== 'string') return [];

            return valor
                .split('//')
                .map(item => item.trim())
                .filter(Boolean)
                .map(item => {
                    const partes = item
                        .split('||')
                        .map(parte => parte.trim())
                        .filter(Boolean);

                    const dato = partes[0] || '';
                    const tipo = partes[1] || '';
                    const estado = partes.slice(2).join(' ') || '';

                    return { dato, tipo, estado };
                })
                .filter(contacto => contacto.dato);
        }

        function formatearTextoContactoSinSeparadores(valor) {
            if (valor === null || valor === undefined || valor === '') return '—';
            if (typeof valor !== 'string') return String(valor);

            return valor
                .replace(/\s*\/\/\s*/g, ' | ')
                .replace(/\s*\|\|\s*/g, ' - ')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function crearCardContacto(contacto, columna, indice) {
            const card = document.createElement('div');
            card.className = 'contact-card';

            const header = document.createElement('div');
            header.className = 'contact-card-header';

            const kind = document.createElement('span');
            kind.className = 'contact-card-kind';
            kind.textContent = `${columna === 'CORREO' ? 'Correo' : 'Teléfono'} ${indice}`;
            header.appendChild(kind);

            const value = crearEnlaceContacto(contacto.dato, columna, 'contact-card-value');
            header.appendChild(value);

            card.appendChild(header);

            const meta = document.createElement('div');
            meta.className = 'contact-card-meta';

            if (contacto.tipo) {
                meta.appendChild(crearChipContacto(contacto.tipo, 'contact-chip contact-chip--tipo'));
            }

            if (contacto.estado) {
                meta.appendChild(crearChipContacto(
                    contacto.estado,
                    `contact-chip ${obtenerClaseEstado(contacto.estado)}`
                ));
            }

            if (meta.childElementCount) {
                card.appendChild(meta);
            }

            return card;
        }

        function crearEnlaceContacto(dato, columna, className) {
            const link = document.createElement('a');
            link.className = className;
            link.textContent = dato;
            link.href = columna === 'CORREO'
                ? `mailto:${dato}`
                : `tel:${dato.replace(/[^\d+]/g, '')}`;
            return link;
        }

        function crearChipContacto(texto, className) {
            const chip = document.createElement('span');
            chip.className = className;
            chip.textContent = texto;
            return chip;
        }

        function obtenerClaseEstado(estado) {
            const clave = estado.trim().toUpperCase();

            if (clave === 'PREFERIDO' || clave === 'PRIMARIO') {
                return 'contact-chip--estado';
            }

            if (clave === 'OTROS' || clave === 'SECUNDARIO') {
                return 'contact-chip--estado-secundario';
            }

            return 'contact-chip--estado-neutro';
        }

        function abrirOverlayContactos(columna, contactos) {
            const overlay = document.getElementById('contact-overlay');
            const title = document.getElementById('contact-overlay-title');
            const list = document.getElementById('contact-overlay-list');

            title.textContent = columna === 'CORREO' ? 'Correos registrados' : 'Teléfonos registrados';
            list.innerHTML = '';

            contactos.forEach((contacto, idx) => {
                list.appendChild(crearCardContacto(contacto, columna, idx + 1));
            });

            overlay.hidden = false;
            document.body.classList.add('overlay-open');
        }

        function cerrarOverlayContactos() {
            const overlay = document.getElementById('contact-overlay');
            overlay.hidden = true;
            document.body.classList.remove('overlay-open');
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                const overlay = document.getElementById('contact-overlay');
                if (overlay && !overlay.hidden) cerrarOverlayContactos();
            }
        });

        // ──────────────────────────────────────────────────
        //  Exportar a Excel
        // ──────────────────────────────────────────────────
        function exportarExcel() {
            if (!datosGlobales.length || !columnasGlobales.length) return;

            const encabezado = ['N°', ...columnasGlobales.map(c => LABELS[c] || formatearNombreColumna(c))];
            const filas = datosGlobales.map((fila, idx) => {
                const row = [idx + 1];
                columnasGlobales.forEach(col => {
                    const val = fila[col];
                    row.push((val === null || val === undefined) ? '' : val);
                });
                return row;
            });

            const ws = XLSX.utils.aoa_to_sheet([encabezado, ...filas]);
            ws['!cols'] = calcularAnchosExcel(encabezado, filas);

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Asesorados');
            XLSX.writeFile(wb, `Asesorados_${new Date().toISOString().slice(0,10)}.xlsx`);
        }

        // ──────────────────────────────────────────────────
        //  Ajustar anchos para exportación Excel
        // ──────────────────────────────────────────────────
        function calcularAnchosExcel(encabezado, filas) {
            return encabezado.map((titulo, index) => {
                const anchoMaximo = filas.reduce((maximo, fila) => {
                    const valor = fila[index] === null || fila[index] === undefined ? '' : String(fila[index]);
                    return Math.max(maximo, valor.length);
                }, String(titulo).length);

                return { wch: Math.min(Math.max(anchoMaximo + 2, 8), 40) };
            });
        }

        // ──────────────────────────────────────────────────
        //  Error en panel de asesorados
        // ──────────────────────────────────────────────────
        function mostrarError(msg) {
            const el = document.getElementById('tb-estado');
            el.innerHTML = `
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#c8102e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <span>${msg}</span>`;
            el.classList.add('tb-estado--error');
            el.style.display = 'flex';
            document.getElementById('tb-subtitulo').textContent = 'Error al cargar datos';
        }

        init();
