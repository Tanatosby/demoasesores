<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consola de Asesorados — UDEP</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    <!-- SheetJS para exportar a Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
</head>
<body class="tabla-page">

    <!-- ── Navbar ── -->
    <header class="tb-navbar">
        <div class="tb-navbar-brand">
            <div class="tb-logo-text">
                Universidad de Piura
                <span>Sistema de Asesoramiento</span>
            </div>
        </div>
        <div class="tb-navbar-right">
            <span class="tb-user-badge" id="tb-usuario">—</span>
            <a href="/api/logout" class="tb-btn-logout">Cerrar sesión</a>
        </div>
    </header>

    <!-- ── Contenido principal ── -->
    <main class="tb-main">

        <!-- Titulo + contador -->
        <div class="tb-page-header">
            <div>
                <h1 class="tb-title">Alumnos Asesorados</h1>
                <p class="tb-subtitle" id="tb-subtitulo">Cargando datos...</p>
            </div>
            <button class="tb-btn-excel" id="btn-excel" onclick="exportarExcel()" disabled>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Exportar a Excel
            </button>
        </div>

        <!-- Estado de carga / error -->
        <div id="tb-estado" class="tb-estado">
            <div class="tb-spinner"></div>
            <span>Consultando base de datos...</span>
        </div>

        <!-- Tabla -->
        <div class="tb-table-wrap" id="tb-table-wrap" style="display:none;">
            <table class="tb-table" id="tb-tabla">
                <thead>
                    <tr>
                        <th class="col-num">N°</th>
                        <th>Código</th>
                        <th>Apellidos</th>
                        <th>Nombres</th>
                        <th>Programa</th>
                        <th>Campus</th>
                        <th>P. Admisión</th>
                        <th>Ciclo</th>
                        <th>Atributo</th>
                    </tr>
                </thead>
                <tbody id="tb-body"></tbody>
            </table>
        </div>

    </main>

    <script>
        // ──────────────────────────────────────────────────
        //  Etiquetas amigables por columna
        // ──────────────────────────────────────────────────
        const LABELS = {
            SPRIDEN_ID:             'Código',
            SPRIDEN_FIRST_NAME:     'Nombres',
            SPRIDEN_LAST_NAME:      'Apellidos',
            SORLCUR_PROGRAM:        'Programa',
            SORLCUR_CAMP_CODE:      'Campus',
            SORLCUR_TERM_CODE_ADMIT:'P. Admisión',
            CICLO_ACTUAL:           'Ciclo',
            ATRIBUTO_ALUMNO:        'Atributo'
        };

        // Orden de columnas visibles en la tabla HTML
        const COLS_VISIBLE = [
            'SPRIDEN_ID', 'SPRIDEN_LAST_NAME', 'SPRIDEN_FIRST_NAME',
            'SORLCUR_PROGRAM', 'SORLCUR_CAMP_CODE',
            'SORLCUR_TERM_CODE_ADMIT', 'CICLO_ACTUAL', 'ATRIBUTO_ALUMNO'
        ];

        let datosGlobales = [];

        // ──────────────────────────────────────────────────
        //  Inicialización
        // ──────────────────────────────────────────────────
        async function init() {
            // Verificar sesión
            const sesRes = await fetch('/api/sesion');
            if (sesRes.status === 401) { window.location.href = '/'; return; }
            const ses = await sesRes.json();
            if (ses.success) {
                document.getElementById('tb-usuario').textContent = ses.usuario;
            }

            // Cargar alumnos
            try {
                const res  = await fetch('/api/alumnos');
                const data = await res.json();

                document.getElementById('tb-estado').style.display = 'none';

                if (!data.success) {
                    mostrarError(data.mensaje || 'Error al obtener los datos');
                    return;
                }

                datosGlobales = data.datos;
                renderTabla(data.datos);

                const total = data.total;
                document.getElementById('tb-subtitulo').textContent =
                    `${total} alumno${total !== 1 ? 's' : ''} asignado${total !== 1 ? 's' : ''}`;

                document.getElementById('btn-excel').disabled = false;
                document.getElementById('tb-table-wrap').style.display = '';

            } catch (err) {
                mostrarError('No se pudo conectar con el servidor');
            }
        }

        // ──────────────────────────────────────────────────
        //  Renderizar filas
        // ──────────────────────────────────────────────────
        function renderTabla(datos) {
            const tbody = document.getElementById('tb-body');
            tbody.innerHTML = '';

            datos.forEach((fila, idx) => {
                const tr = document.createElement('tr');

                // Número de fila
                const tdNum = document.createElement('td');
                tdNum.className = 'col-num';
                tdNum.textContent = idx + 1;
                tr.appendChild(tdNum);

                COLS_VISIBLE.forEach(col => {
                    const td = document.createElement('td');
                    const val = fila[col];
                    td.textContent = (val === null || val === undefined) ? '—' : val;
                    if (col === 'ATRIBUTO_ALUMNO' && val) {
                        td.className = 'col-badge';
                    }
                    tr.appendChild(td);
                });

                tbody.appendChild(tr);
            });
        }

        // ──────────────────────────────────────────────────
        //  Exportar a Excel con SheetJS
        // ──────────────────────────────────────────────────
        function exportarExcel() {
            if (!datosGlobales.length) return;

            // Construir filas con etiquetas amigables
            const encabezado = ['N°', ...COLS_VISIBLE.map(c => LABELS[c] || c)];
            const filas = datosGlobales.map((fila, idx) => {
                const row = [idx + 1];
                COLS_VISIBLE.forEach(col => {
                    const val = fila[col];
                    row.push((val === null || val === undefined) ? '' : val);
                });
                return row;
            });

            const wsData = [encabezado, ...filas];
            const ws     = XLSX.utils.aoa_to_sheet(wsData);

            // Ancho de columnas
            ws['!cols'] = [
                { wch: 5 },  // N°
                { wch: 12 }, // Código
                { wch: 22 }, // Apellidos
                { wch: 22 }, // Nombres
                { wch: 30 }, // Programa
                { wch: 8 },  // Campus
                { wch: 13 }, // P. Admisión
                { wch: 8 },  // Ciclo
                { wch: 20 }, // Atributo
            ];

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Asesorados');

            const fecha  = new Date().toISOString().slice(0, 10);
            XLSX.writeFile(wb, `Asesorados_${fecha}.xlsx`);
        }

        // ──────────────────────────────────────────────────
        //  Mensaje de error
        // ──────────────────────────────────────────────────
        function mostrarError(msg) {
            const el = document.getElementById('tb-estado');
            el.innerHTML = `
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#c8102e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <span>${msg}</span>`;
            el.classList.add('tb-estado--error');
            el.style.display = 'flex';
        }

        init();
    </script>

</body>
</html>
